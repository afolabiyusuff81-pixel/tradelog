<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>TradeLog — My Trading Journal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #080b10;
      --surface: #0e1219;
      --surface2: #141921;
      --border: rgba(255,255,255,0.07);
      --border2: rgba(255,255,255,0.12);
      --text: #dde2ec;
      --muted: #4a5568;
      --accent: #3b82f6;
      --green: #10b981;
      --red: #f43f5e;
      --yellow: #f59e0b;
      --purple: #8b5cf6;
      --teal: #06b6d4;
      --mono: 'IBM Plex Mono', monospace;
      --sans: 'Outfit', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-thumb { background: #2a3040; border-radius: 4px; }

    /* ── AUTH SCREEN ── */
    #auth-screen {
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: radial-gradient(ellipse at 60% 30%, rgba(59,130,246,0.07) 0%, transparent 60%),
                  radial-gradient(ellipse at 20% 80%, rgba(139,92,246,0.06) 0%, transparent 50%),
                  var(--bg);
      padding: 24px;
    }
    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 16px;
      padding: 48px 40px;
      max-width: 400px; width: 100%;
      text-align: center;
      box-shadow: 0 0 60px rgba(0,0,0,0.4);
    }
    .auth-logo {
      width: 52px; height: 52px; border-radius: 14px;
      background: linear-gradient(135deg, var(--accent), var(--purple));
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px;
      font-size: 22px;
    }
    .auth-title { font-size: 26px; font-weight: 800; margin-bottom: 8px; }
    .auth-sub { color: var(--muted); font-size: 14px; margin-bottom: 36px; line-height: 1.6; }
    .google-btn {
      display: flex; align-items: center; justify-content: center; gap: 12px;
      width: 100%; padding: 14px;
      background: white; color: #1a1a1a;
      border: none; border-radius: 10px;
      font-size: 15px; font-weight: 600; font-family: var(--sans);
      cursor: pointer; transition: all 0.2s;
    }
    .google-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(255,255,255,0.1); }
    .google-btn svg { flex-shrink: 0; }

    /* ── APP SHELL ── */
    #app { display: none; flex-direction: column; min-height: 100vh; }
    header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(8,11,16,0.92); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      display: flex; align-items: center; justify-content: space-between;
      height: 56px;
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .logo-mark {
      width: 28px; height: 28px; border-radius: 7px;
      background: linear-gradient(135deg, var(--accent), var(--purple));
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
    }
    .app-name { font-size: 16px; font-weight: 800; }
    .header-right { display: flex; align-items: center; gap: 10px; }
    #user-avatar {
      width: 30px; height: 30px; border-radius: 50%;
      background: var(--surface2); border: 1px solid var(--border);
      cursor: pointer; overflow: hidden;
    }
    #user-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .sign-out-btn {
      background: none; border: 1px solid var(--border);
      color: var(--muted); padding: 5px 12px; border-radius: 6px;
      font-size: 12px; font-family: var(--mono); cursor: pointer; transition: all 0.15s;
    }
    .sign-out-btn:hover { border-color: var(--border2); color: var(--text); }

    /* ── NAV TABS ── */
    nav {
      display: flex; border-bottom: 1px solid var(--border);
      background: var(--surface); padding: 0 20px;
    }
    .nav-tab {
      background: none; border: none; cursor: pointer;
      padding: 14px 18px; font-size: 12px; font-family: var(--mono);
      letter-spacing: 1.5px; color: var(--muted);
      border-bottom: 2px solid transparent; margin-bottom: -1px;
      transition: all 0.15s;
    }
    .nav-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .nav-tab:hover:not(.active) { color: var(--text); }

    /* ── MAIN CONTENT ── */
    main { flex: 1; padding: 24px 20px; max-width: 1100px; margin: 0 auto; width: 100%; }

    /* ── STAT CARDS ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px; margin-bottom: 20px;
    }
    .stat-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 18px 20px;
      transition: border-color 0.15s;
    }
    .stat-card:hover { border-color: var(--border2); }
    .stat-label {
      font-size: 10px; font-family: var(--mono);
      color: var(--muted); letter-spacing: 2px; margin-bottom: 10px;
    }
    .stat-value { font-size: 22px; font-weight: 800; font-family: var(--mono); line-height: 1; }
    .stat-sub { font-size: 11px; color: var(--muted); margin-top: 6px; }

    /* ── EQUITY CHART ── */
    .chart-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 20px 24px; margin-bottom: 20px;
    }
    .card-label {
      font-size: 10px; font-family: var(--mono);
      color: var(--muted); letter-spacing: 2px; margin-bottom: 16px;
    }
    #equity-svg { width: 100%; }

    /* ── MARKET BREAKDOWN ── */
    .breakdown-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 20px 24px; margin-bottom: 20px;
    }
    .mkt-row { margin-bottom: 14px; }
    .mkt-top { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 13px; }
    .mkt-bar-bg { background: rgba(255,255,255,0.05); border-radius: 3px; height: 4px; }
    .mkt-bar { height: 4px; border-radius: 3px; transition: width 0.5s ease; }

    /* ── FORM ── */
    .form-card {
      background: var(--surface); border: 1px solid var(--border2);
      border-radius: 12px; padding: 22px; margin-bottom: 20px;
      animation: slideDown 0.2s ease;
    }
    @keyframes slideDown { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
    .form-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
    .form-title { font-size: 12px; font-family: var(--mono); color: var(--muted); letter-spacing: 2px; }
    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
    }
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-label { font-size: 10px; font-family: var(--mono); color: var(--muted); letter-spacing: 1.5px; }
    .form-input, .form-select, .form-textarea {
      background: rgba(255,255,255,0.04); border: 1px solid var(--border);
      border-radius: 7px; color: var(--text); padding: 9px 12px;
      font-size: 13px; font-family: var(--sans); outline: none;
      transition: border-color 0.15s; width: 100%;
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--accent); }
    .form-select option { background: #1a2030; }
    .form-textarea { resize: vertical; min-height: 72px; grid-column: 1 / -1; }
    .pnl-preview {
      margin-top: 12px; padding: 10px 14px;
      background: rgba(255,255,255,0.03); border-radius: 7px;
      display: flex; gap: 20px; flex-wrap: wrap;
      font-size: 12px; font-family: var(--mono);
    }
    .form-actions { display: flex; gap: 10px; margin-top: 16px; }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #6366f1);
      border: none; color: white; padding: 10px 20px;
      border-radius: 8px; font-size: 13px; font-weight: 700;
      font-family: var(--sans); cursor: pointer; transition: all 0.2s;
    }
    .btn-primary:hover { transform: translateY(-1px); filter: brightness(1.1); }
    .btn-secondary {
      background: rgba(255,255,255,0.05); border: 1px solid var(--border);
      color: var(--muted); padding: 10px 16px;
      border-radius: 8px; font-size: 13px; font-family: var(--sans); cursor: pointer; transition: all 0.15s;
    }
    .btn-secondary:hover { background: rgba(255,255,255,0.08); color: var(--text); }

    /* ── FILTERS ── */
    .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; align-items: center; }
    .filter-label { font-size: 10px; font-family: var(--mono); color: var(--muted); letter-spacing: 1.5px; }
    .filter-btn {
      background: rgba(255,255,255,0.03); border: 1px solid var(--border);
      color: var(--muted); padding: 4px 12px;
      border-radius: 5px; font-size: 11px; font-family: var(--mono); cursor: pointer; transition: all 0.15s;
    }
    .filter-btn.active { background: rgba(255,255,255,0.09); border-color: var(--border2); color: var(--text); }
    .divider { width: 1px; height: 16px; background: var(--border); }

    /* ── TABLE ── */
    .table-wrap { overflow-x: auto; border-radius: 12px; border: 1px solid var(--border); }
    table { width: 100%; border-collapse: collapse; min-width: 700px; }
    thead th {
      padding: 11px 14px; text-align: left;
      font-size: 10px; font-family: var(--mono);
      letter-spacing: 1.5px; color: var(--muted);
      background: var(--surface); border-bottom: 1px solid var(--border);
      cursor: pointer; user-select: none; white-space: nowrap;
    }
    thead th:hover { color: var(--text); }
    tbody tr { border-bottom: 1px solid rgba(255,255,255,0.04); transition: background 0.1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(255,255,255,0.025); }
    tbody td { padding: 12px 14px; font-size: 13px; vertical-align: middle; }
    .td-mono { font-family: var(--mono); font-size: 12px; }
    .td-symbol { font-weight: 700; font-size: 14px; }

    /* ── PILLS ── */
    .pill {
      display: inline-block; border-radius: 4px; padding: 2px 8px;
      font-size: 10px; font-family: var(--mono); letter-spacing: 0.5px; white-space: nowrap;
      border: 1px solid;
    }
    .pill-long { background: rgba(16,185,129,0.1); color: var(--green); border-color: rgba(16,185,129,0.25); }
    .pill-short { background: rgba(244,63,94,0.1); color: var(--red); border-color: rgba(244,63,94,0.25); }
    .pill-stocks { background: rgba(139,92,246,0.1); color: var(--purple); border-color: rgba(139,92,246,0.25); }
    .pill-forex { background: rgba(245,158,11,0.1); color: var(--yellow); border-color: rgba(245,158,11,0.25); }
    .pill-options { background: rgba(244,63,94,0.1); color: #fb7185; border-color: rgba(244,63,94,0.25); }
    .pill-futures { background: rgba(6,182,212,0.1); color: var(--teal); border-color: rgba(6,182,212,0.25); }

    .pnl-pos { color: var(--green); font-family: var(--mono); font-weight: 600; }
    .pnl-neg { color: var(--red); font-family: var(--mono); font-weight: 600; }

    .row-actions { display: flex; gap: 4px; }
    .row-btn {
      background: none; border: none; cursor: pointer; padding: 5px;
      border-radius: 5px; opacity: 0.35; transition: opacity 0.15s;
    }
    .row-btn:hover { opacity: 1; }

    /* ── TABLE FOOTER ── */
    .table-footer {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 16px; background: var(--surface);
      border-top: 1px solid var(--border); border-radius: 0 0 12px 12px;
      font-size: 11px; font-family: var(--mono); color: var(--muted);
    }

    /* ── ADD BTN ── */
    .add-btn {
      display: flex; align-items: center; gap: 6px;
      background: linear-gradient(135deg, var(--accent), #6366f1);
      border: none; color: white; padding: 9px 16px;
      border-radius: 8px; font-size: 12px; font-weight: 700;
      font-family: var(--mono); cursor: pointer; transition: all 0.2s; letter-spacing: 1px;
    }
    .add-btn:hover { transform: translateY(-1px); filter: brightness(1.1); }

    /* ── EMPTY STATE ── */
    .empty-state {
      text-align: center; padding: 64px 20px;
      background: var(--surface); border-radius: 12px;
      border: 1px solid var(--border);
    }
    .empty-icon { font-size: 40px; margin-bottom: 14px; opacity: 0.3; }
    .empty-text { font-size: 12px; font-family: var(--mono); color: var(--muted); letter-spacing: 2px; }

    /* ── LOADING ── */
    #loading {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--mono); color: var(--muted); font-size: 13px;
      letter-spacing: 2px;
    }
    .dot-anim::after { content: ''; animation: dots 1.2s steps(4, end) infinite; }
    @keyframes dots { 0%,20%{content:'.'} 40%{content:'..'} 60%,100%{content:'...'} }

    /* ── TOAST ── */
    #toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--surface2); border: 1px solid var(--border2);
      color: var(--text); padding: 12px 20px; border-radius: 8px;
      font-size: 13px; font-family: var(--mono);
      opacity: 0; transition: all 0.25s; pointer-events: none; white-space: nowrap; z-index: 200;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── MOBILE ── */
    @media (max-width: 600px) {
      header { padding: 0 14px; }
      main { padding: 16px 12px; }
      .auth-card { padding: 36px 24px; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .form-grid { grid-template-columns: repeat(2, 1fr); }
      .nav-tab { padding: 12px 12px; font-size: 10px; }
    }
  </style>
</head>
<body>

<!-- Loading -->
<div id="loading">LOADING<span class="dot-anim"></span></div>

<!-- Auth Screen -->
<div id="auth-screen" style="display:none;">
  <div class="auth-card">
    <div class="auth-logo">📈</div>
    <h1 class="auth-title">TradeLog</h1>
    <p class="auth-sub">Your personal trading journal.<br/>Log trades, track performance, grow as a trader.</p>
    <button class="google-btn" id="google-sign-in">
      <svg width="20" height="20" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Continue with Google
    </button>
  </div>
</div>

<!-- App -->
<div id="app">
  <header>
    <div class="header-left">
      <div class="logo-mark">📈</div>
      <span class="app-name">TradeLog</span>
    </div>
    <div class="header-right">
      <div id="user-avatar"><img id="user-photo" src="" alt="" /></div>
      <button class="sign-out-btn" id="sign-out-btn">SIGN OUT</button>
    </div>
  </header>

  <nav>
    <button class="nav-tab active" data-tab="dashboard">DASHBOARD</button>
    <button class="nav-tab" data-tab="journal">JOURNAL</button>
  </nav>

  <main>
    <!-- DASHBOARD TAB -->
    <div id="tab-dashboard">
      <div class="stats-grid" id="stats-grid">
        <!-- injected by JS -->
      </div>
      <div class="chart-card" id="chart-section" style="display:none;">
        <div class="card-label">EQUITY CURVE</div>
        <svg id="equity-svg" height="80" viewBox="0 0 600 80" preserveAspectRatio="none"></svg>
        <div style="display:flex;justify-content:space-between;margin-top:8px;font-size:10px;font-family:var(--mono);color:var(--muted);">
          <span id="curve-start"></span><span id="curve-end"></span>
        </div>
      </div>
      <div class="breakdown-card" id="breakdown-section" style="display:none;">
        <div class="card-label">P&L BY MARKET</div>
        <div id="breakdown-rows"></div>
      </div>
      <div class="breakdown-card" id="recent-section">
        <div class="card-label">RECENT TRADES</div>
        <div id="recent-rows"></div>
      </div>
    </div>

    <!-- JOURNAL TAB -->
    <div id="tab-journal" style="display:none;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px;">
        <div style="font-size:20px;font-weight:800;">Trade Log</div>
        <button class="add-btn" id="show-form-btn">＋ LOG TRADE</button>
      </div>

      <!-- Form -->
      <div id="trade-form" style="display:none;">
        <div class="form-card">
          <div class="form-header">
            <span class="form-title" id="form-mode-label">LOG NEW TRADE</span>
            <button class="row-btn" id="close-form-btn" style="opacity:0.6;">
              <svg width="16" height="16" fill="none" stroke="#aaa" stroke-width="2" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>
            </button>
          </div>
          <div class="form-grid">
            <div class="form-group">
              <label class="form-label">DATE</label>
              <input type="date" class="form-input" id="f-date" />
            </div>
            <div class="form-group">
              <label class="form-label">SYMBOL</label>
              <input type="text" class="form-input" id="f-symbol" placeholder="AAPL, EUR/USD…" />
            </div>
            <div class="form-group">
              <label class="form-label">MARKET</label>
              <select class="form-select" id="f-market">
                <option>Stocks</option><option>Forex</option><option>Options</option><option>Futures</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">DIRECTION</label>
              <select class="form-select" id="f-direction">
                <option>Long</option><option>Short</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">ENTRY PRICE</label>
              <input type="number" step="any" class="form-input" id="f-entry" placeholder="0.00" />
            </div>
            <div class="form-group">
              <label class="form-label">EXIT PRICE</label>
              <input type="number" step="any" class="form-input" id="f-exit" placeholder="0.00" />
            </div>
            <div class="form-group">
              <label class="form-label">QUANTITY / LOTS</label>
              <input type="number" step="any" class="form-input" id="f-qty" placeholder="0" />
            </div>
            <div class="form-group">
              <label class="form-label">SETUP</label>
              <select class="form-select" id="f-setup">
                <option>Breakout</option><option>Pullback</option><option>Reversal</option>
                <option>Trend Follow</option><option>Range</option><option>News Play</option><option>Other</option>
              </select>
            </div>
            <div class="form-group" style="grid-column:1/-1;">
              <label class="form-label">NOTES / RATIONALE</label>
              <textarea class="form-textarea" id="f-notes" placeholder="Why you took this trade, what you learned…"></textarea>
            </div>
          </div>
          <div class="pnl-preview" id="pnl-preview" style="display:none;"></div>
          <div class="form-actions">
            <button class="btn-primary" id="save-trade-btn">SAVE TRADE</button>
            <button class="btn-secondary" id="cancel-form-btn">CANCEL</button>
          </div>
        </div>
      </div>

      <!-- Filters -->
      <div class="filters" id="filters-row">
        <span class="filter-label">MARKET:</span>
        <button class="filter-btn active" data-market="All">ALL</button>
        <button class="filter-btn" data-market="Stocks">STOCKS</button>
        <button class="filter-btn" data-market="Forex">FOREX</button>
        <button class="filter-btn" data-market="Options">OPTIONS</button>
        <button class="filter-btn" data-market="Futures">FUTURES</button>
        <div class="divider"></div>
        <button class="filter-btn active" data-dir="All">ALL</button>
        <button class="filter-btn" data-dir="Long">LONG</button>
        <button class="filter-btn" data-dir="Short">SHORT</button>
      </div>

      <!-- Table -->
      <div id="trades-container"></div>
    </div>
  </main>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- ══════════════════════════════════════════════
     FIREBASE CONFIG — REPLACE THIS SECTION
     ══════════════════════════════════════════════ -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import {
    getFirestore, collection, addDoc, getDocs, updateDoc, deleteDoc, doc, query, where, orderBy
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // ⚠️  PASTE YOUR FIREBASE CONFIG HERE (from Firebase Console → Project Settings → Your apps)
  const firebaseConfig = {


  apiKey: "AIzaSyAef1jcRmbzkmtepm6RrMzilZKG9cnTpCo",


  authDomain: "tradelog-3eda1.firebaseapp.com",


  projectId: "tradelog-3eda1",


  storageBucket: "tradelog-3eda1.firebasestorage.app",


  messagingSenderId: "106640931794",


  appId: "1:106640931794:web:5837c8bcfbf0d4c1d7660b"


};

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const provider = new GoogleAuthProvider();

  // ── State ──
  let trades = [];
  let editId = null;
  let filterMarket = "All";
  let filterDir = "All";
  let sortCol = "date";
  let sortDir = "desc";
  let currentUser = null;

  const fmt = n => Number(n).toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  const fmtPnL = n => (n >= 0 ? "+" : "-") + "$" + fmt(Math.abs(n));
  const today = () => new Date().toISOString().split("T")[0];

  // ── Toast ──
  function toast(msg) {
    const el = document.getElementById("toast");
    el.textContent = msg; el.classList.add("show");
    setTimeout(() => el.classList.remove("show"), 2500);
  }

  // ── Auth ──
  document.getElementById("google-sign-in").addEventListener("click", async () => {
    try { await signInWithPopup(auth, provider); } catch(e) { toast("Sign in failed: " + e.message); }
  });
  document.getElementById("sign-out-btn").addEventListener("click", () => signOut(auth));

  onAuthStateChanged(auth, async user => {
    document.getElementById("loading").style.display = "none";
    if (user) {
      currentUser = user;
      document.getElementById("auth-screen").style.display = "none";
      document.getElementById("app").style.display = "flex";
      document.getElementById("user-photo").src = user.photoURL || "";
      await loadTrades();
      renderDashboard();
      renderTable();
    } else {
      currentUser = null;
      document.getElementById("auth-screen").style.display = "flex";
      document.getElementById("app").style.display = "none";
    }
  });

  // ── Firestore ──
  async function loadTrades() {
    if (!currentUser) return;
    const q = query(collection(db, "trades"), where("uid", "==", currentUser.uid));
    const snap = await getDocs(q);
    trades = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  }

  async function saveTrade(data) {
    if (editId) {
      await updateDoc(doc(db, "trades", editId), data);
      toast("TRADE UPDATED");
    } else {
      await addDoc(collection(db, "trades"), { ...data, uid: currentUser.uid });
      toast("TRADE SAVED");
    }
    await loadTrades(); renderDashboard(); renderTable(); hideForm();
  }

  async function deleteTrade(id) {
    if (!confirm("Delete this trade?")) return;
    await deleteDoc(doc(db, "trades", id));
    trades = trades.filter(t => t.id !== id);
    toast("TRADE DELETED");
    renderDashboard(); renderTable();
  }

  // ── P&L Calc ──
  function calcPnL(entry, exit, qty, direction) {
    entry = parseFloat(entry); exit = parseFloat(exit); qty = parseFloat(qty);
    if (!entry || !exit || !qty) return 0;
    const diff = direction === "Long" ? exit - entry : entry - exit;
    return parseFloat((diff * qty).toFixed(2));
  }

  // ── Tabs ──
  document.querySelectorAll(".nav-tab").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".nav-tab").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      const tab = btn.dataset.tab;
      document.getElementById("tab-dashboard").style.display = tab === "dashboard" ? "block" : "none";
      document.getElementById("tab-journal").style.display = tab === "journal" ? "block" : "none";
    });
  });

  // ── Form ──
  function showForm(trade = null) {
    editId = trade ? trade.id : null;
    document.getElementById("form-mode-label").textContent = trade ? "EDIT TRADE" : "LOG NEW TRADE";
    document.getElementById("f-date").value = trade ? trade.date : today();
    document.getElementById("f-symbol").value = trade ? trade.symbol : "";
    document.getElementById("f-market").value = trade ? trade.market : "Stocks";
    document.getElementById("f-direction").value = trade ? trade.direction : "Long";
    document.getElementById("f-entry").value = trade ? trade.entry : "";
    document.getElementById("f-exit").value = trade ? trade.exit : "";
    document.getElementById("f-qty").value = trade ? trade.qty : "";
    document.getElementById("f-setup").value = trade ? trade.setup : "Breakout";
    document.getElementById("f-notes").value = trade ? (trade.notes || "") : "";
    document.getElementById("trade-form").style.display = "block";
    document.getElementById("pnl-preview").style.display = "none";
    updatePnLPreview();
    document.getElementById("f-symbol").focus();
  }

  function hideForm() {
    document.getElementById("trade-form").style.display = "none";
    editId = null;
  }

  function updatePnLPreview() {
    const entry = parseFloat(document.getElementById("f-entry").value);
    const exit = parseFloat(document.getElementById("f-exit").value);
    const qty = parseFloat(document.getElementById("f-qty").value);
    const dir = document.getElementById("f-direction").value;
    const prev = document.getElementById("pnl-preview");
    if (entry && exit && qty) {
      const pnl = calcPnL(entry, exit, qty, dir);
      const move = dir === "Long" ? ((exit - entry) / entry * 100) : ((entry - exit) / entry * 100);
      prev.style.display = "flex";
      prev.innerHTML = `<span style="color:var(--muted)">PREVIEW P&L: <span style="color:${pnl>=0?'var(--green)':'var(--red)'}; font-weight:600">${fmtPnL(pnl)}</span></span>
        <span style="color:var(--muted)">MOVE: <span style="color:var(--text)">${move.toFixed(2)}%</span></span>`;
    } else { prev.style.display = "none"; }
  }

  ["f-entry","f-exit","f-qty","f-direction"].forEach(id => {
    document.getElementById(id).addEventListener("input", updatePnLPreview);
    document.getElementById(id).addEventListener("change", updatePnLPreview);
  });

  document.getElementById("show-form-btn").addEventListener("click", () => showForm());
  document.getElementById("close-form-btn").addEventListener("click", hideForm);
  document.getElementById("cancel-form-btn").addEventListener("click", hideForm);

  document.getElementById("save-trade-btn").addEventListener("click", async () => {
    const symbol = document.getElementById("f-symbol").value.trim().toUpperCase();
    const entry = parseFloat(document.getElementById("f-entry").value);
    const exit = parseFloat(document.getElementById("f-exit").value);
    const qty = parseFloat(document.getElementById("f-qty").value);
    const direction = document.getElementById("f-direction").value;
    if (!symbol || !entry || !exit || !qty) { toast("FILL IN ALL REQUIRED FIELDS"); return; }
    const pnl = calcPnL(entry, exit, qty, direction);
    await saveTrade({
      date: document.getElementById("f-date").value,
      symbol, entry, exit, qty, direction, pnl,
      market: document.getElementById("f-market").value,
      setup: document.getElementById("f-setup").value,
      notes: document.getElementById("f-notes").value.trim()
    });
  });

  // ── Filters ──
  document.querySelectorAll("[data-market]").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll("[data-market]").forEach(b => b.classList.remove("active"));
      btn.classList.add("active"); filterMarket = btn.dataset.market; renderTable();
    });
  });
  document.querySelectorAll("[data-dir]").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll("[data-dir]").forEach(b => b.classList.remove("active"));
      btn.classList.add("active"); filterDir = btn.dataset.dir; renderTable();
    });
  });

  // ── Pill HTML ──
  function pillHtml(text, type) {
    const cls = {
      Long:"long", Short:"short", Stocks:"stocks", Forex:"forex", Options:"options", Futures:"futures"
    }[text] || "stocks";
    return `<span class="pill pill-${cls}">${text.toUpperCase()}</span>`;
  }

  // ── Render Table ──
  function renderTable() {
    let rows = [...trades];
    if (filterMarket !== "All") rows = rows.filter(t => t.market === filterMarket);
    if (filterDir !== "All") rows = rows.filter(t => t.direction === filterDir);
    rows.sort((a, b) => {
      let va = a[sortCol], vb = b[sortCol];
      if (typeof va === "string") { va = va.toLowerCase(); vb = vb.toLowerCase(); }
      return sortDir === "asc" ? (va > vb ? 1 : -1) : (va < vb ? 1 : -1);
    });

    const container = document.getElementById("trades-container");
    if (!rows.length) {
      container.innerHTML = `<div class="empty-state"><div class="empty-icon">📒</div><div class="empty-text">NO TRADES FOUND</div></div>`;
      return;
    }

    const filteredPnL = rows.reduce((s, t) => s + (t.pnl || 0), 0);
    const thStyle = (col) => `style="cursor:pointer;${sortCol===col?'color:var(--text)':''}"`;
    const arrow = (col) => sortCol === col ? (sortDir === "asc" ? " ↑" : " ↓") : "";

    container.innerHTML = `
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th ${thStyle("date")} data-sort="date">DATE${arrow("date")}</th>
              <th ${thStyle("symbol")} data-sort="symbol">SYMBOL${arrow("symbol")}</th>
              <th>MARKET</th><th>DIR</th>
              <th ${thStyle("entry")} data-sort="entry">ENTRY${arrow("entry")}</th>
              <th ${thStyle("exit")} data-sort="exit">EXIT${arrow("exit")}</th>
              <th>QTY</th>
              <th>SETUP</th>
              <th ${thStyle("pnl")} data-sort="pnl">P&L${arrow("pnl")}</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            ${rows.map(t => `
              <tr>
                <td class="td-mono" style="color:var(--muted)">${t.date}</td>
                <td class="td-symbol">${t.symbol}</td>
                <td>${pillHtml(t.market, t.market)}</td>
                <td>${pillHtml(t.direction, t.direction)}</td>
                <td class="td-mono">${fmt(t.entry)}</td>
                <td class="td-mono">${fmt(t.exit)}</td>
                <td class="td-mono" style="color:var(--muted)">${t.qty}</td>
                <td style="font-size:12px;color:var(--muted)">${t.setup}</td>
                <td class="${t.pnl >= 0 ? 'pnl-pos' : 'pnl-neg'}">${fmtPnL(t.pnl)}</td>
                <td>
                  <div class="row-actions">
                    <button class="row-btn" data-edit="${t.id}" title="Edit">
                      <svg width="13" height="13" fill="none" stroke="#aaa" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                    </button>
                    <button class="row-btn" data-delete="${t.id}" title="Delete">
                      <svg width="13" height="13" fill="none" stroke="#f43f5e" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
                    </button>
                  </div>
                </td>
              </tr>`).join("")}
          </tbody>
        </table>
        <div class="table-footer">
          <span>${rows.length} TRADE${rows.length !== 1 ? "S" : ""}</span>
          <span>FILTERED P&L: <span style="color:${filteredPnL>=0?'var(--green)':'var(--red)'}; font-weight:600">${fmtPnL(filteredPnL)}</span></span>
        </div>
      </div>`;

    // Sort click
    container.querySelectorAll("[data-sort]").forEach(th => {
      th.addEventListener("click", () => {
        const col = th.dataset.sort;
        if (sortCol === col) sortDir = sortDir === "asc" ? "desc" : "asc";
        else { sortCol = col; sortDir = "desc"; }
        renderTable();
      });
    });
    // Edit / Delete
    container.querySelectorAll("[data-edit]").forEach(btn => {
      btn.addEventListener("click", () => {
        const t = trades.find(x => x.id === btn.dataset.edit);
        if (t) showForm(t);
      });
    });
    container.querySelectorAll("[data-delete]").forEach(btn => {
      btn.addEventListener("click", () => deleteTrade(btn.dataset.delete));
    });
  }

  // ── Render Dashboard ──
  function renderDashboard() {
    const wins = trades.filter(t => t.pnl > 0);
    const losses = trades.filter(t => t.pnl <= 0);
    const totalPnL = trades.reduce((s, t) => s + (t.pnl || 0), 0);
    const winRate = trades.length ? (wins.length / trades.length) * 100 : 0;
    const avgWin = wins.length ? wins.reduce((s, t) => s + t.pnl, 0) / wins.length : 0;
    const avgLoss = losses.length ? losses.reduce((s, t) => s + t.pnl, 0) / losses.length : 0;
    const rr = avgLoss !== 0 ? Math.abs(avgWin / avgLoss) : 0;

    const pnlColor = totalPnL >= 0 ? "var(--green)" : "var(--red)";
    const wrColor = winRate >= 50 ? "var(--green)" : "var(--red)";

    document.getElementById("stats-grid").innerHTML = `
      ${statCard("TOTAL P&L", (totalPnL >= 0 ? "+" : "-") + "$" + fmt(Math.abs(totalPnL)), `${trades.length} trades`, pnlColor)}
      ${statCard("WIN RATE", winRate.toFixed(1) + "%", `${wins.length}W / ${losses.length}L`, wrColor)}
      ${statCard("AVG WIN", "+$" + fmt(avgWin), "per winning trade", "var(--green)")}
      ${statCard("AVG LOSS", "-$" + fmt(Math.abs(avgLoss)), "per losing trade", "var(--red)")}
      ${statCard("RISK : REWARD", rr.toFixed(2), "avg RR ratio", "var(--purple)")}
    `;

    // Equity curve
    const sorted = [...trades].sort((a, b) => a.date.localeCompare(b.date));
    let cum = 0;
    const curve = sorted.map(t => { cum += (t.pnl || 0); return cum; });
    if (curve.length > 1) {
      document.getElementById("chart-section").style.display = "block";
      const min = Math.min(...curve), max = Math.max(...curve), range = max - min || 1;
      const W = 600, H = 80;
      const pts = curve.map((v, i) => `${(i / (curve.length - 1)) * W},${H - ((v - min) / range) * H}`).join(" ");
      const lastPt = curve[curve.length - 1];
      const lineColor = lastPt >= 0 ? "#10b981" : "#f43f5e";
      document.getElementById("equity-svg").innerHTML = `
        <defs>
          <linearGradient id="eg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="${lineColor}" stop-opacity="0.25"/>
            <stop offset="100%" stop-color="${lineColor}" stop-opacity="0"/>
          </linearGradient>
        </defs>
        <polygon points="0,${H} ${pts} ${W},${H}" fill="url(#eg)"/>
        <polyline points="${pts}" fill="none" stroke="${lineColor}" stroke-width="2" stroke-linejoin="round"/>
      `;
      document.getElementById("curve-start").textContent = sorted[0]?.date || "";
      document.getElementById("curve-end").textContent = sorted[sorted.length - 1]?.date || "";
    } else {
      document.getElementById("chart-section").style.display = "none";
    }

    // Market breakdown
    const markets = ["Stocks", "Forex", "Options", "Futures"];
    const mktColors = { Stocks: "var(--purple)", Forex: "var(--yellow)", Options: "#fb7185", Futures: "var(--teal)" };
    const mktData = markets.map(m => ({
      m, pnl: trades.filter(t => t.market === m).reduce((s, t) => s + (t.pnl || 0), 0),
      count: trades.filter(t => t.market === m).length
    })).filter(m => m.count > 0);

    if (mktData.length) {
      document.getElementById("breakdown-section").style.display = "block";
      const maxAbs = Math.max(...mktData.map(m => Math.abs(m.pnl)), 1);
      document.getElementById("breakdown-rows").innerHTML = mktData.map(m => `
        <div class="mkt-row">
          <div class="mkt-top">
            <span style="color:${mktColors[m.m]};font-size:13px">${m.m}</span>
            <span style="font-family:var(--mono);font-size:12px;color:${m.pnl>=0?'var(--green)':'var(--red)'}; font-weight:600">${fmtPnL(m.pnl)} <span style="color:var(--muted);font-weight:400">(${m.count})</span></span>
          </div>
          <div class="mkt-bar-bg"><div class="mkt-bar" style="width:${(Math.abs(m.pnl)/maxAbs*100).toFixed(1)}%;background:${m.pnl>=0?'var(--green)':'var(--red)'}"></div></div>
        </div>`).join("");
    } else {
      document.getElementById("breakdown-section").style.display = "none";
    }

    // Recent trades
    const recent = [...trades].sort((a, b) => b.date.localeCompare(a.date)).slice(0, 6);
    document.getElementById("recent-rows").innerHTML = recent.length
      ? recent.map(t => `
        <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.04);">
          <div style="display:flex;align-items:center;gap:10px;">
            <span style="font-size:16px">${t.pnl >= 0 ? "📈" : "📉"}</span>
            <div>
              <span style="font-weight:700;font-size:14px">${t.symbol}</span>
              <span style="color:var(--muted);font-size:11px;margin-left:8px;font-family:var(--mono)">${t.date}</span>
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:8px;">
            ${pillHtml(t.market)} ${pillHtml(t.direction)}
            <span class="${t.pnl>=0?'pnl-pos':'pnl-neg'}" style="min-width:80px;text-align:right">${fmtPnL(t.pnl)}</span>
          </div>
        </div>`).join("")
      : `<p style="color:var(--muted);font-size:13px;font-family:var(--mono)">NO TRADES YET — START LOGGING!</p>`;
  }

  function statCard(label, value, sub, accent) {
    return `<div class="stat-card">
      <div class="stat-label">${label}</div>
      <div class="stat-value" style="color:${accent}">${value}</div>
      <div class="stat-sub">${sub}</div>
    </div>`;
  }
</script>
</body>
</html>
